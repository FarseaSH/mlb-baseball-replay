name: Build and Deploy MLB Pages

on:
  schedule:
    # GitHub Actions cron 使用 UTC。
    # 这里覆盖北京时间 02:30 到 14:30，对应 UTC 18:30 到次日 06:30，每 10 分钟运行一次。
    - cron: "30,40,50 18 * * *"
    - cron: "*/10 19-23 * * *"
    - cron: "*/10 0-4 * * *"
    - cron: "0,10,20,30 5 * * *"
    - cron: "0,10,20,30 6 * * *"
  workflow_dispatch:
    inputs:
      force_refresh:
        description: "是否强制全量刷新最近两周（等价 --force-refresh）"
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: America/Los_Angeles

    steps:
      - name: Validate required config
        run: |
          if [ -z "${{ secrets.PRIVATE_CODE_REPO }}" ]; then
            echo "::error::Missing secret PRIVATE_CODE_REPO (example: your-org/mlb-baseball-replay-code)"
            exit 1
          fi

          if [ -z "${{ secrets.PRIVATE_REPO_TOKEN }}" ]; then
            echo "::error::Missing secret PRIVATE_REPO_TOKEN"
            exit 1
          fi

      - name: Resolve state branch
        id: state_ref
        run: |
          if [ -n "${{ secrets.PRIVATE_STATE_REF }}" ]; then
            echo "value=${{ secrets.PRIVATE_STATE_REF }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=site-state" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout private generator repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.PRIVATE_CODE_REPO }}
          ref: ${{ secrets.PRIVATE_CODE_REF != '' && secrets.PRIVATE_CODE_REF || 'main' }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: code
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: code
        run: python -m pip install -r requirements.txt

      - name: Restore incremental state from state branch
        working-directory: code
        env:
          STATE_REPO_TOKEN: ${{ secrets.PRIVATE_STATE_TOKEN != '' && secrets.PRIVATE_STATE_TOKEN || github.token }}
        run: |
          set -euo pipefail
          STATE_REF="${{ steps.state_ref.outputs.value }}"
          STATE_REPO_URL="https://x-access-token:${STATE_REPO_TOKEN}@github.com/${{ github.repository }}.git"

          if git ls-remote --exit-code --heads "${STATE_REPO_URL}" "refs/heads/${STATE_REF}" >/dev/null 2>&1; then
            rm -rf ../state-restore
            git clone --depth=1 --branch "${STATE_REF}" "${STATE_REPO_URL}" ../state-restore
            if [ -d ../state-restore/public ]; then
              mkdir -p public
              rsync -a --delete ../state-restore/public/ public/
            else
              mkdir -p public
            fi
            echo "restored public from ${STATE_REF} in ${{ github.repository }}"
          else
            mkdir -p public
            echo "state branch ${STATE_REF} not found in ${{ github.repository }}, start from empty public"
          fi

      - name: Build static site
        working-directory: code
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force_refresh }}" = "true" ]; then
            python scripts/sync_site.py --force-refresh
          else
            python scripts/sync_site.py
          fi

      - name: Persist incremental state to state branch
        working-directory: code
        env:
          STATE_REPO_TOKEN: ${{ secrets.PRIVATE_STATE_TOKEN != '' && secrets.PRIVATE_STATE_TOKEN || github.token }}
        run: |
          set -euo pipefail
          STATE_REF="${{ steps.state_ref.outputs.value }}"
          STATE_DIR="../state-branch-workdir"
          STATE_REPO_URL="https://x-access-token:${STATE_REPO_TOKEN}@github.com/${{ github.repository }}.git"

          rm -rf "${STATE_DIR}"

          if git ls-remote --exit-code --heads "${STATE_REPO_URL}" "refs/heads/${STATE_REF}" >/dev/null 2>&1; then
            git clone --depth=1 --branch "${STATE_REF}" "${STATE_REPO_URL}" "${STATE_DIR}"
          else
            git clone --depth=1 "${STATE_REPO_URL}" "${STATE_DIR}"
            (
              cd "${STATE_DIR}"
              git checkout --orphan "${STATE_REF}"
              git rm -rf . >/dev/null 2>&1 || true
            )
          fi

          rsync -a --delete public/ "${STATE_DIR}/public/"

          (
            cd "${STATE_DIR}"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add public
            if git diff --cached --quiet; then
              echo "no state changes to commit"
            else
              git commit -m "Update incremental public state"
              git remote set-url origin "${STATE_REPO_URL}"
              git push origin "HEAD:${STATE_REF}"
            fi
          )

          rm -rf "${STATE_DIR}" ../state-restore

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages output
        run: |
          mkdir -p code/public

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: code/public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
